<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Data Centers and Climate Impact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true"></div>

    <header class="hero" id="top">
      <h1>Data Centers and Climate Impact</h1>
      <p class="lead">
        As interest in AI and LLMs grow, an abundance of data centers are being built, raising concerns for
        their impacts on resource consumption and the environment.
      </p>
      
   
    </header>

    <section class="hero">
      <svg  id="viz1" width="95vw" height="100vh"></svg>
    </section>
    <section class="viz-container">
      <div class="map-wrapper">
        <svg id="viz2"></svg>
      </div>
    
      <aside class="side-panel">
        <h3>Data Center Sim</h3>
        
        <div class="control-group">
          <label>Create Data Centers</label>
          <div class="select-stack">
            <select id="dc1-select" class="dc-config"><option>D1 | Size / Type</option></select>
            <select id="dc2-select" class="dc-config"><option>D2 | Size / Type</option></select>
            <select id="dc3-select" class="dc-config"><option>D3 | Size / Type</option></select>
          </div>
        </div>
      
        <hr>
      
        <div class="stats-group">
          <div class="stat-item">
            <span class="label">Annual Energy Consumption</span>
            <span class="value" id="energy-val">## TW / year</span>
          </div>
          <div class="stat-item">
            <span class="label">Average Electricity Cost</span>
            <span class="value" id="cost-val">$###.## / year</span>
          </div>
        </div>
      </aside>
    </section>
  </body>

  <script src="https://unpkg.com/topojson@3"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/6.7.0/d3.min.js"></script>
  <script src="./script.js" type="module"></script>
</html>
